<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş — Kurumsal Veri Platformu</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0D2149 0%, #2D5BE3 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .kart {
            background: white;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 {
            font-size: 20px;
            color: #0D2149;
            margin-top: 10px;
        }
        .logo p { font-size: 13px; color: #888; margin-top: 5px; }
        .form-grup { margin-bottom: 20px; }
        .form-grup label {
            display: block;
            font-size: 13px;
            color: #555;
            margin-bottom: 6px;
            font-weight: bold;
        }
        .form-grup input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        .form-grup input:focus {
            outline: none;
            border-color: #2D5BE3;
        }
        .btn {
            width: 100%;
            padding: 13px;
            background: #0D2149;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover { background: #2D5BE3; }
        .hata {
            background: #fff3f3;
            border-left: 4px solid #e74c3c;
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 13px;
            color: #e74c3c;
            margin-bottom: 20px;
        }
        .bilgi {
            margin-top: 25px;
            padding: 15px;
            background: #E8EEF8;
            border-radius: 8px;
            font-size: 12px;
            color: #555;
        }
        .bilgi b { color: #0D2149; }
    </style>
</head>
<body>
<div class="kart">
    <div class="logo">
        <div style="font-size:40px;">🏢</div>
        <h1>Kurumsal Veri Platformu</h1>
        <p>Lütfen giriş yapın</p>
    </div>

    {% with mesajlar = get_flashed_messages(with_categories=true) %}
        {% for kategori, mesaj in mesajlar %}
            <div class="hata">⚠️ {{ mesaj }}</div>
        {% endfor %}
    {% endwith %}

    <form method="POST">
        <div class="form-grup">
            <label>Kullanıcı Adı</label>
            <input type="text" name="kullanici_adi" placeholder="admin" required>
        </div>
        <div class="form-grup">
            <label>Şifre</label>
            <input type="password" name="sifre" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn">Giriş Yap</button>
    </form>

    <div class="bilgi">
        <b>Test Hesapları:</b><br>
        Admin: <b>admin</b> / <b>admin123</b><br>
        İzleyici: <b>izleyici</b> / <b>izleyici123</b>
    </div>
</div>
</body>
</html>
